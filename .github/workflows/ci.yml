name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service:
          - monitoring-adapter
          - alert-intelligence
          - orchestrator
          - context-agent
          - model-router
          - resolution-agent
          - approval-service
          - remediation-engine
          - closure-service
          - ui
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.service }}
        run: docker build -f Dockerfile.service -t kaiops/${{ matrix.service }}:${{ github.sha }} .

  kube-validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate manifests
        run: kubectl apply --dry-run=client -f k8s/
